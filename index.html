  <script>
    function copyCA() {
      const ca = document.getElementById('ca').innerText;
      navigator.clipboard.writeText(ca);
    }
    // Tab switching logic
    document.querySelectorAll('.editor-tab').forEach(tab => {
      tab.addEventListener('click', function() {
        document.querySelectorAll('.editor-tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        const tabName = this.getAttribute('data-tab');
        document.getElementById('editor-grid-title').textContent = tabName.toUpperCase();
        // Show/hide grids
        if(tabName === 'Background') {
          document.getElementById('editor-grid-items').style.display = '';
          document.getElementById('eyes-grid-items').style.display = 'none';
          document.getElementById('extras-grid-items').style.display = 'none';
        } else if(tabName === 'Eyes') {
          document.getElementById('editor-grid-items').style.display = 'none';
          document.getElementById('eyes-grid-items').style.display = '';
          document.getElementById('extras-grid-items').style.display = 'none';
        } else if(tabName === 'Extras') {
          document.getElementById('editor-grid-items').style.display = 'none';
          document.getElementById('eyes-grid-items').style.display = 'none';
          document.getElementById('extras-grid-items').style.display = '';
        } else {
          document.getElementById('editor-grid-items').style.display = '';
          document.getElementById('eyes-grid-items').style.display = 'none';
          document.getElementById('extras-grid-items').style.display = 'none';
        }
      });
    });
    // Eyes: 8 bit glasses click handler
    document.getElementById('eyes-8bit-item').addEventListener('click', function() {
      const eyesImg = document.getElementById('editor-eyes');
      eyesImg.src = 'eyes/8bit-glasses2.png';
      eyesImg.style.display = eyesImg.src ? '' : 'none';
      eyesImg.removeAttribute('class');
      eyesImg.style.position = 'absolute';
      eyesImg.style.width = '180px';
      eyesImg.style.height = '110px';
      eyesImg.style.left = '85px';
      eyesImg.style.top = '100px';
      eyesImg.style.pointerEvents = 'none';
      eyesImg.style.zIndex = '10';
      eyesImg.style.filter = 'drop-shadow(0 2px 6px rgba(0,0,0,0.4))';
      eyesImg.style.transform = 'rotate(15deg)';
    });
    // Eyes: shutter shades click handler

    function downloadZazu() {
      const frame = document.getElementById('zazu-frame');
      const canvas = document.createElement('canvas');
      const size = 350;
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext('2d');

      // Helper to draw an image if src is set, with optional rotation (in degrees)
      function drawImageIfSet(img, dx=0, dy=0, dw=size, dh=size, rotationDeg=0) {
        return new Promise(resolve => {
          if (!img || !img.src || img.src === window.location.href || img.src === '') return resolve();
          const image = new window.Image();
          image.crossOrigin = 'anonymous';
          image.onload = function() {
            ctx.save();
            // Apply rotation if needed
            if (rotationDeg && rotationDeg !== 0) {
              // Rotate around the center of the image
              ctx.translate(dx + dw/2, dy + dh/2);
              ctx.rotate(rotationDeg * Math.PI / 180);
              ctx.drawImage(image, -dw/2, -dh/2, dw, dh);
            } else {
              ctx.drawImage(image, dx, dy, dw, dh);
            }
            ctx.restore();
            resolve();
          };
          image.onerror = resolve;
          image.src = img.src;
        });
      }

      // Helper to get overlay rect relative to frame, scaled to canvas
      function getOverlayRect(img, frame) {
        if (!img || img.style.display === 'none') return null;
        const imgRect = img.getBoundingClientRect();
        const frameRect = frame.getBoundingClientRect();
        const scaleX = size / frameRect.width;
        const scaleY = size / frameRect.height;
        return {
          x: (imgRect.left - frameRect.left) * scaleX,
          y: (imgRect.top - frameRect.top) * scaleY,
          w: imgRect.width * scaleX,
          h: imgRect.height * scaleY
        };
      }

      // 1. Draw background (solid or image)
      let bgPromise = Promise.resolve();
      const bgClass = frame.className;
      if (bgClass.includes('bg-white')) {
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, size, size);
      } else {
        // Check for a background image class
        const bgMap = {
          'bg-stonks': 'backgrounds/stonks.webp',
          'bg-beach': 'backgrounds/beach.jpg',
          'bg-bottom': 'backgrounds/bottom.png',
          'bg-dubai': 'backgrounds/dubai.jpg',
          'bg-dust': 'backgrounds/dust.avif',
          'bg-green3': 'backgrounds/green3.jpg',
          'bg-us15': 'backgrounds/US-15.jpg',
          'bg-mars': 'backgrounds/mars].jpg',
          'bg-green': 'backgrounds/green.jpg',
          'bg-matrix-code': 'backgrounds/matrix-code.avif',
          'bg-photo-1517976547714': 'backgrounds/photo-1517976547714-720226b864c1.jpg',
          'bg-premium-photo': 'backgrounds/premium_photo-1681469490587-cf7ff1d6fc00.jpg',
          'bg-blue-sky': 'backgrounds/pngtree-a-blue-sky-above-clouds-with-clouds-image_13313410.jpg',
          'bg-download': 'backgrounds/download.webp',
        };
        let found = false;
        for (const key in bgMap) {
          if (bgClass.includes(key)) {
            found = true;
            const bgImg = new window.Image();
            bgImg.crossOrigin = 'anonymous';
            bgPromise = new Promise(resolve => {
              bgImg.onload = function() {
                ctx.drawImage(bgImg, 0, 0, size, size);
                resolve();
              };
              bgImg.onerror = resolve;
              bgImg.src = bgMap[key];
            });
            break;
          }
        }
        if (!found) {
          // Default to white if no background
          ctx.fillStyle = '#fff';
          ctx.fillRect(0, 0, size, size);
        }
      }
      // Draw white border to match .zazu-frame
      ctx.save();
      ctx.lineWidth = 10; // 5px on each side, like border: 5px solid #fff
      ctx.strokeStyle = '#fff';
      ctx.strokeRect(0, 0, size, size);
      ctx.restore();

      // 2. Draw overlays in order: zazu, eyes, all extras
      const zazuImg = document.getElementById('editor-zazu');
      const eyesImg = document.getElementById('editor-eyes');
      // Draw all extras overlays (in DOM order)
      const extrasImgs = Array.from(frame.querySelectorAll('img[data-extra]'));

      bgPromise.then(() => {
        // Draw Zazu using its actual DOM position and size
        if (zazuImg && zazuImg.src) {
          const rect = getOverlayRect(zazuImg, frame);
          if (rect) {
            return drawImageIfSet(zazuImg, rect.x, rect.y, rect.w, rect.h);
          }
        }
      }).then(() => {
        // Draw eyes overlay (if visible)
        if (eyesImg && eyesImg.style.display !== 'none' && eyesImg.src) {
          const rect = getOverlayRect(eyesImg, frame);
          if (rect) {
            // Get rotation from style.transform (e.g. 'rotate(15deg)')
            let rotation = 0;
            const m = eyesImg.style.transform && eyesImg.style.transform.match(/rotate\((-?\d+(?:\.\d+)?)deg\)/);
            if (m) rotation = parseFloat(m[1]);
            return drawImageIfSet(eyesImg, rect.x, rect.y, rect.w, rect.h, rotation);
          }
        }
      }).then(() => {
        // Draw all extras overlays (in DOM order)
        return extrasImgs.reduce((p, img) => {
          return p.then(() => {
            if (img && img.src && img.style.display !== 'none') {
              const rect = getOverlayRect(img, frame);
              if (rect) {
                return drawImageIfSet(img, rect.x, rect.y, rect.w, rect.h);
              }
            }
          });
        }, Promise.resolve());
      }).then(() => {
        // Open the canvas as PNG in a new tab with an <img> tag
        const dataUrl = canvas.toDataURL('image/png');
        console.log('Canvas data URL:', dataUrl);
        const win = window.open();
        win.document.write('<title>Your Zazu Image</title>');
        win.document.write('<div style="text-align:center;font-family:sans-serif;margin-top:24px;">');
        win.document.write('<p><b>Right-click the image to save or copy it.</b></p>');
        win.document.write('<a href="' + dataUrl + '" download="zazu.png" style="display:inline-block;margin-bottom:16px;padding:8px 20px;background:#222;color:#fff;border-radius:6px;text-decoration:none;font-weight:bold;">Download Image</a><br>');
        win.document.write('<img src="' + dataUrl + '" style="max-width:100%;display:block;margin:auto;border:2px solid #eee;border-radius:8px;">');
        win.document.write('</div>');
        win.document.close();
      });
    }
  </script>
  <script>
    // Fix grid layout bug on initial page load
    window.addEventListener('DOMContentLoaded', function() {
      const grid = document.getElementById('editor-grid-items');
      grid.style.display = 'none';
      setTimeout(() => {
        grid.style.display = '';
        grid.scrollTop = 0;
      }, 0);
    });
  </script>
